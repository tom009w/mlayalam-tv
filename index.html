
<!DOCTYPE html>
<html>
<head>
  <title>Malayalam Live TV</title>
  <style>
    body { background:black; color:white; font-family:sans-serif; }
    .channels div { padding:10px; cursor:pointer; }
    .channels div:hover { background:gray; }
  </style>
</head>

<body>

<h2>📺 Malayalam Live TV</h2>

<iframe id="player" width="100%" height="500"
src="https://www.youtube.com/embed/live_stream?channel=UCuh3F3lVg1cA7L5Yw6k0Fjg"
allowfullscreen>
</iframe>

<div class="channels">
  <div onclick="play('UCuh3F3lVg1cA7L5Yw6k0Fjg')">Asianet News</div>
  <div onclick="play('UCk8GzjMOrta8yxDcKfylJYw')">Manorama News</div>
  <div onclick="play('UCpCiIDf9UrfRqte55FHWlYQ')">24 News</div>
</div>

<script>
function play(id){
  document.getElementById("player").src =
  "https://www.youtube.com/embed/live_stream?channel=" + id;
  https://www.youtube.com/embed?listType=user_uploads&list=CHANNEL_ID
}
</script>

</body>
</html>
